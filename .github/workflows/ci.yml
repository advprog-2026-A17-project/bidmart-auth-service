name: Continuous Integration

on:
  pull_request:
    branches: ["cicd", "staging", "main"]
  push:
    branches: ["cicd", "staging", "main"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run Unit Tests & Coverage Check
        run: |
          chmod +x gradlew
          ./gradlew clean check integrationTest

  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x gradlew
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not set; skipping SonarCloud scan."
            exit 0
          fi

          set +e
          ./gradlew test jacocoTestReport sonar 2>&1 | tee sonar.log
          sonar_status=${PIPESTATUS[0]}
          set -e

          if [ "${sonar_status}" -ne 0 ]; then
            if grep -qi "Automatic Analysis is enabled" sonar.log; then
              echo "SonarCloud Automatic Analysis is enabled; skipping CI sonar scan."
              exit 0
            fi
            exit "${sonar_status}"
          fi
