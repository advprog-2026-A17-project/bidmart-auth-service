server.port=${PORT:${SERVER_PORT:8080}}
spring.config.import=optional:file:.env[.properties],optional:file:../bidmart-infrastructure/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/bidmart_auth_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.auth.email-verification.base-url=${AUTH_EMAIL_VERIFICATION_BASE_URL:http://localhost:3000/verify-email}
app.auth.email-verification.from=${AUTH_EMAIL_VERIFICATION_FROM:no-reply@bidmart.local}
app.auth.email-verification.token-ttl-seconds=${AUTH_EMAIL_VERIFICATION_TOKEN_TTL_SECONDS:86400}
app.auth.email-verification.resend-cooldown-seconds=${AUTH_EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
